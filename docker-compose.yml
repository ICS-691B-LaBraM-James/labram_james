services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws/stream
    depends_on:
      - backend

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      # MOUNT THE SIBLING FOLDER HERE
      - ./LEAD:/app/LEAD
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/LEAD
    extra_hosts:
      - "host.docker.internal:host-gateway"
